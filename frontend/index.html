<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FleetPulse</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#0D1117;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
max-width:800px;
padding:20px;
}

h1{
font-size:48px;
}

h1 span{
color:#FF6B35;
}

p{
color:#94A3B8;
margin-top:10px;
line-height:1.6;
}

.buttons{
margin-top:40px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:15px 25px;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:700;
transition:.3s;
display:inline-block;
}

/* 🔶 BOTH BUTTONS NOW FOLLOW SAME BRAND THEME */

.merchant{
background:linear-gradient(135deg,#FF6B35,#FF8C42);
}

.dispatcher{
background:linear-gradient(135deg,#FF6B35,#FF8C42);
opacity:0.95;
}

/* 🔥 unified hover effect */

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(255,107,53,.45);
}

</style>
</head>

<body>

<div class="container">

<h1>Welcome to Fleet<span>Pulse</span></h1>

<p>
A smart logistics control system for merchants, dispatchers, and delivery operations.
</p>

<div class="buttons">

<a class="btn merchant" href="/login.html">Merchant Portal</a>
<a class="btn dispatcher" href="/login.html">Dispatcher Portal</a>

</div>

</div>

</body>
</html>
