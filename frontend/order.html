<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order — FleetPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0D1117;
--card:#161B22;
--accent:#FF6B35;
--accent2:#FF8C42;
--text:#F8FAFC;
--muted:#94A3B8;
--border:#26303C;
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{ background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

.logo{ font-size:22px; font-weight:800; margin-bottom:24px; text-align:center; }
.logo span{ color:var(--accent); }

.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:32px; width:100%; max-width:480px;
  box-shadow:0 0 40px rgba(255,107,53,.08);
}

.merchant-hero{
  text-align:center; margin-bottom:28px; padding-bottom:20px;
  border-bottom:1px solid var(--border);
}
.merchant-avatar{
  width:64px; height:64px; border-radius:50%;
  background:rgba(255,107,53,.15); color:var(--accent);
  font-size:26px; font-weight:800; display:flex;
  align-items:center; justify-content:center; margin:0 auto 12px;
  border:2px solid rgba(255,107,53,.3);
}
.merchant-name{ font-size:22px; font-weight:700; margin-bottom:4px; }
.merchant-address{ font-size:13px; color:var(--muted); }

.field{ margin-bottom:16px; }
.field label{
  display:block; font-size:11px; font-weight:600; color:var(--muted);
  text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px;
}
.field input, .field textarea{
  width:100%; padding:12px 14px; border:1px solid var(--border);
  border-radius:10px; background:#1B2430; color:var(--text);
  font-family:'Inter',sans-serif; font-size:14px; outline:none;
  transition:border-color .2s;
}
.field input:focus, .field textarea:focus{ border-color:var(--accent); }
.field input::placeholder, .field textarea::placeholder{ color:#4A5568; }
.field textarea{ resize:none; height:80px; }

.location-row{ display:flex; gap:8px; }
.location-row input{ margin:0; }
.loc-btn{
  flex-shrink:0; padding:12px 14px; border:1px solid var(--border);
  border-radius:10px; background:#1B2430; color:var(--muted);
  font-size:12px; font-weight:500; cursor:pointer; white-space:nowrap;
  font-family:'Inter',sans-serif; transition:.2s;
}
.loc-btn:hover{ color:white; border-color:var(--accent); }

.coord-status{
  font-size:11px; margin-top:5px; padding:5px 10px;
  border-radius:6px; display:none;
}
.coord-status.success{ background:rgba(63,185,80,.1); color:#3FB950; display:block; }
.coord-status.error  { background:rgba(248,81,73,.1);  color:#F85149; display:block; }
.coord-status.loading{ background:rgba(255,107,53,.1); color:var(--accent); display:block; }

.submit-btn{
  width:100%; padding:14px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#FF6B35,#FF8C42); color:white;
  font-weight:700; font-size:15px; cursor:pointer;
  font-family:'Inter',sans-serif; transition:.3s; margin-top:8px;
}
.submit-btn:hover{ transform:translateY(-2px); box-shadow:0 0 25px rgba(255,107,53,.4); }
.submit-btn:disabled{ background:#2A3142; color:#4A5568; cursor:not-allowed; transform:none; box-shadow:none; }

.error-banner{
  background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3);
  color:#F85149; padding:12px 16px; border-radius:10px;
  font-size:13px; margin-bottom:16px; display:none;
}
.error-banner.show{ display:block; }

.success-screen{
  display:none; text-align:center; padding:20px 0;
}
.success-icon{ font-size:56px; margin-bottom:16px; }
.success-title{ font-size:22px; font-weight:700; margin-bottom:8px; }
.success-sub{ font-size:14px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
.track-btn{
  display:inline-block; padding:12px 28px; border-radius:12px;
  background:linear-gradient(135deg,#FF6B35,#FF8C42); color:white;
  font-weight:700; font-size:14px; text-decoration:none; transition:.3s;
}
.track-btn:hover{ transform:translateY(-2px); box-shadow:0 0 20px rgba(255,107,53,.4); }

.not-found{ text-align:center; padding:40px 0; }
.not-found h2{ font-size:20px; margin-bottom:8px; }
.not-found p{ color:var(--muted); font-size:14px; }

.powered{
  text-align:center; margin-top:20px;
  font-size:12px; color:var(--muted);
}
.powered span{ color:var(--accent); font-weight:600; }
</style>
</head>
<body>

<div class="logo">Fleet<span>Pulse</span></div>

<div class="card" id="main-card">
  <div style="text-align:center;padding:20px;color:var(--muted)">Loading…</div>
</div>

<div class="powered">Powered by <span>FleetPulse</span> · Fast. Reliable. Commission-free.</div>

<script>
const API = 'https://fleetpulse-production-2e5c.up.railway.app';
let merchant = null;
let deliveryLat = null, deliveryLng = null;
let geocodeTimer = null;

// Get slug from URL — /order/chai-point
const slug = window.location.pathname.split('/').filter(Boolean).pop();

async function init() {
  if (!slug || slug === 'order.html') {
    showNotFound();
    return;
  }
  try {
    const res = await fetch(`${API}/public/merchant/${slug}`);
    if (!res.ok) { showNotFound(); return; }
    merchant = await res.json();
    renderForm();
  } catch(e) {
    showNotFound();
  }
}

function renderForm() {
  document.title = `Order from ${merchant.name} — FleetPulse`;
  document.getElementById('main-card').innerHTML = `
    <div class="merchant-hero">
      <div class="merchant-avatar">${merchant.name.charAt(0).toUpperCase()}</div>
      <div class="merchant-name">${merchant.name}</div>
      ${merchant.address ? `<div class="merchant-address">📍 ${merchant.address}</div>` : ''}
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="field">
      <label>Your name</label>
      <input id="f-name" placeholder="e.g. Rahul Sharma">
    </div>
    <div class="field">
      <label>Your phone</label>
      <input id="f-phone" type="tel" placeholder="e.g. 9876543210">
    </div>
    <div class="field">
      <label>Delivery address</label>
      <div class="location-row">
        <input id="f-address" placeholder="e.g. Flat 4B, Bandra East, Mumbai" oninput="geocodeDelivery()">
        <button class="loc-btn" id="detect-btn" onclick="detectLocation()">📍 Me</button>
      </div>
      <div class="coord-status" id="coord-status"></div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="f-notes" placeholder="Call before delivery, leave at door…"></textarea>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="placeOrder()">
      Place Order 🚀
    </button>
  `;
}

function detectLocation() {
  if (!navigator.geolocation) { setStatus('error', 'Geolocation not supported'); return; }
  const btn = document.getElementById('detect-btn');
  btn.textContent = '⏳';
  setStatus('loading', 'Detecting your location…');

  navigator.geolocation.getCurrentPosition(async (pos) => {
    deliveryLat = pos.coords.latitude;
    deliveryLng = pos.coords.longitude;
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${deliveryLat}&lon=${deliveryLng}&format=json`);
      const data = await res.json();
      const address = data.display_name.split(',').slice(0,3).join(',').trim();
      document.getElementById('f-address').value = address;
    } catch {}
    setStatus('success', `📍 Location set: ${deliveryLat.toFixed(4)}, ${deliveryLng.toFixed(4)}`);
    btn.textContent = '✅';
    setTimeout(() => { btn.textContent = '📍 Me'; }, 2000);
  }, () => {
    setStatus('error', 'Location denied — type your address manually');
    btn.textContent = '📍 Me';
  });
}

function geocodeDelivery() {
  clearTimeout(geocodeTimer);
  const val = document.getElementById('f-address').value.trim();
  if (val.length < 5) return;
  geocodeTimer = setTimeout(async () => {
    setStatus('loading', 'Looking up address…');
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=1&countrycodes=in`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.length > 0) {
        deliveryLat = parseFloat(data[0].lat);
        deliveryLng = parseFloat(data[0].lon);
        setStatus('success', `📍 Found: ${deliveryLat.toFixed(4)}, ${deliveryLng.toFixed(4)}`);
      } else {
        setStatus('error', 'Address not found — try being more specific');
      }
    } catch { setStatus('error', 'Could not look up address'); }
  }, 800);
}

function setStatus(type, msg) {
  const el = document.getElementById('coord-status');
  el.className = `coord-status ${type}`;
  el.textContent = msg;
}

async function placeOrder() {
  const name    = document.getElementById('f-name').value.trim();
  const phone   = document.getElementById('f-phone').value.trim();
  const address = document.getElementById('f-address').value.trim();
  const notes   = document.getElementById('f-notes').value.trim();
  const errEl   = document.getElementById('error-banner');
  errEl.classList.remove('show');

  if (!name)    { showError('Enter your name'); return; }
  if (!phone)   { showError('Enter your phone number'); return; }
  if (!address) { showError('Enter your delivery address'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Placing order…';

  try {
    const res = await fetch(`${API}/public/merchant/${slug}/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customer_name: name,
        customer_phone: phone,
        delivery_address: address,
        delivery_lat: deliveryLat,
        delivery_lng: deliveryLng,
        notes: notes || null
      })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess(data.order_id, data.tracking_url);
    } else {
      showError(data.detail || 'Order failed — please try again');
      btn.disabled = false; btn.textContent = 'Place Order 🚀';
    }
  } catch(e) {
    showError('Network error — please try again');
    btn.disabled = false; btn.textContent = 'Place Order 🚀';
  }
}

function showSuccess(orderId, trackingUrl) {
  const orderRef = `ORD-${String(orderId).padStart(4,'0')}`;
  document.getElementById('main-card').innerHTML = `
    <div class="success-screen" style="display:block">
      <div class="success-icon">🎉</div>
      <div class="success-title">Order placed!</div>
      <div class="success-sub">
        Your order <strong>${orderRef}</strong> has been received by ${merchant.name}.<br>
        A rider will be assigned shortly.
      </div>
      <a href="/track/${orderRef}" class="track-btn">Track my order →</a>
    </div>
  `;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

function showNotFound() {
  document.getElementById('main-card').innerHTML = `
    <div class="not-found">
      <div style="font-size:48px;margin-bottom:16px">🔍</div>
      <h2>Store not found</h2>
      <p>This order page doesn't exist or has been removed.</p>
    </div>
  `;
}

init();
</script>
</body>
</html>
