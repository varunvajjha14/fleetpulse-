<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPulse — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0D1117;
--card:#161B22;
--accent:#FF6B35;
--accent2:#FF8C42;
--text:#F8FAFC;
--muted:#94A3B8;
--border:#26303C;
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
body{
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}

.login-wrap{
  width:100%; max-width:420px; padding:20px;
}

.logo{
  font-size:32px; font-weight:800; text-align:center; margin-bottom:8px;
}
.logo span{ color:var(--accent); }
.tagline{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:32px; }

.card{
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:32px;
  box-shadow:0 0 40px rgba(255,107,53,.08);
}

.tabs{
  display:flex; background:#0D1117; border-radius:10px;
  padding:3px; margin-bottom:24px; gap:4px;
}
.tab{
  flex:1; padding:8px; border:none; border-radius:8px;
  background:none; color:var(--muted); font-size:13px;
  font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; transition:.2s;
}
.tab.active{ background:var(--card); color:var(--text); }

.field{ margin-bottom:16px; }
.field label{
  display:block; font-size:11px; font-weight:600;
  color:var(--muted); text-transform:uppercase;
  letter-spacing:.06em; margin-bottom:6px;
}
.field input, .field select{
  width:100%; padding:12px 14px;
  border:1px solid var(--border); border-radius:10px;
  background:#1B2430; color:var(--text);
  font-family:'Inter',sans-serif; font-size:14px;
  outline:none; transition:border-color .2s;
}
.field input:focus, .field select:focus{ border-color:var(--accent); }
.field input::placeholder{ color:#4A5568; }

.btn{
  width:100%; padding:13px; border:none; border-radius:12px;
  background:linear-gradient(135deg,#FF6B35,#FF8C42);
  color:white; font-weight:700; font-size:15px;
  cursor:pointer; font-family:'Inter',sans-serif; transition:.3s;
  margin-top:8px;
}
.btn:hover{ transform:translateY(-2px); box-shadow:0 0 25px rgba(255,107,53,.4); }
.btn:disabled{ background:#2A3142; color:#4A5568; cursor:not-allowed; transform:none; box-shadow:none; }

.error-msg{
  background:rgba(248,81,73,.1); border:1px solid rgba(248,81,73,.3);
  color:#F85149; padding:10px 14px; border-radius:8px;
  font-size:13px; margin-bottom:16px; display:none;
}
.error-msg.show{ display:block; }

.success-msg{
  background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.3);
  color:#3FB950; padding:10px 14px; border-radius:8px;
  font-size:13px; margin-bottom:16px; display:none;
}
.success-msg.show{ display:block; }

.divider{
  text-align:center; color:var(--muted); font-size:12px;
  margin:20px 0; position:relative;
}
.divider::before, .divider::after{
  content:''; position:absolute; top:50%;
  width:42%; height:1px; background:var(--border);
}
.divider::before{ left:0; }
.divider::after{ right:0; }

.glow{
  position:fixed; width:400px; height:400px;
  background:rgba(255,107,53,.06); filter:blur(100px);
  border-radius:50%; top:-100px; right:-100px; pointer-events:none;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="login-wrap">
  <div class="logo">Fleet<span>Pulse</span></div>
  <p class="tagline">Hyperlocal fleet management platform</p>

  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form">
      <div class="error-msg" id="login-error"></div>
      <div class="field">
        <label>Email</label>
        <input id="l-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="l-password" type="password" placeholder="••••••••">
      </div>
      <button class="btn" id="login-btn" onclick="login()">Sign In</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="error-msg" id="register-error"></div>
      <div class="success-msg" id="register-success"></div>
      <div class="field">
        <label>Full name</label>
        <input id="r-name" placeholder="e.g. Varun Vajjha">
      </div>
      <div class="field">
        <label>Email</label>
        <input id="r-email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input id="r-password" type="password" placeholder="Min 6 characters">
      </div>
      <div class="field">
        <label>Role</label>
        <select id="r-role">
          <option value="dispatcher">Dispatcher</option>
          <option value="merchant">Merchant</option>
        </select>
      </div>
      <button class="btn" id="register-btn" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<script>
const API = 'https://fleetpulse-production-2e5c.up.railway.app';

function switchTab(tab) {
  document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
}

async function login() {
  const email    = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value.trim();
  const errEl    = document.getElementById('login-error');
  errEl.classList.remove('show');

  if (!email || !password) { showError('login-error', 'Enter email and password'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    // OAuth2 form format
    const formData = new FormData();
    formData.append('username', email);
    formData.append('password', password);

    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();

    if (res.ok) {
      // Save token and user info
      localStorage.setItem('fp_token', data.access_token);
      localStorage.setItem('fp_role',  data.role);
      localStorage.setItem('fp_name',  data.name);

      // Redirect based on role
      if (data.role === 'dispatcher') {
        window.location.href = '/dispatcher.html';
      } else {
        window.location.href = '/merchant.html';
      }
    } else {
      showError('login-error', data.detail || 'Login failed');
    }
  } catch(e) {
    showError('login-error', 'Network error — is server running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function register() {
  const name     = document.getElementById('r-name').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-password').value.trim();
  const role     = document.getElementById('r-role').value;

  if (!name || !email || !password) { showError('register-error', 'Fill in all fields'); return; }
  if (password.length < 6) { showError('register-error', 'Password must be at least 6 characters'); return; }

  const btn = document.getElementById('register-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password, role })
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById('register-success').textContent = `Account created! You can now sign in.`;
      document.getElementById('register-success').classList.add('show');
      document.getElementById('register-error').classList.remove('show');
      setTimeout(() => switchTab('login'), 2000);
    } else {
      showError('register-error', data.detail || 'Registration failed');
    }
  } catch(e) {
    showError('register-error', 'Network error');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
}

// If already logged in redirect immediately
const token = localStorage.getItem('fp_token');
const role  = localStorage.getItem('fp_role');
if (token && role) {
  window.location.href = role === 'dispatcher' ? '/dispatcher.html' : '/merchant.html';
}
</script>
</body>
</html>
